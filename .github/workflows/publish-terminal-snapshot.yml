name: Publish terminal snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "17,47 * * * 1-5"

permissions:
  contents: write

concurrency:
  group: terminal-snapshot
  cancel-in-progress: true

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python publish_snapshot.py
      - name: Commit changed snapshot
        run: |
          git config user.name "trade90-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/terminal-snapshot.json
          git diff --cached --quiet || git commit -m "Update terminal market snapshot"
          git push
